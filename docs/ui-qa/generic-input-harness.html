<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>PromptPanel Generic Input Harness</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #161616;
      color: #f4f4f4;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #161616;
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    section {
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.04);
    }

    h1, h2, p {
      margin: 0;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 15px;
      margin-bottom: 10px;
    }

    .hint {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 12px;
    }

    input,
    textarea,
    .code-editor {
      width: 100%;
      box-sizing: border-box;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.24);
      color: #f4f4f4;
      padding: 12px;
      font-size: 14px;
      outline: none;
    }

    input:focus,
    textarea:focus,
    .code-editor:focus {
      border-color: rgba(111, 193, 79, 0.9);
      box-shadow: 0 0 0 1px rgba(111, 193, 79, 0.25);
    }

    textarea {
      min-height: 128px;
      resize: vertical;
      line-height: 1.5;
    }

    .code-editor {
      min-height: 180px;
      white-space: pre-wrap;
      font-family: SFMono-Regular, Menlo, Monaco, monospace;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.06);
      color: #f4f4f4;
      border-radius: 6px;
      font-size: 12px;
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>PromptPanel 通用输入场景实测</h1>
      <p class="hint">用于验证单行输入、多行编辑和代码样式编辑区的执行结果，不绑定具体工具。</p>
      <div class="toolbar">
        <button type="button" onclick="resetFields()">重置内容</button>
      </div>
    </section>

    <section>
      <h2>标准单行输入框</h2>
      <p class="hint">聚焦后执行词条，验证内容是否直接写入这一行。</p>
      <input id="single-line" placeholder="等待 PromptPanel 自动粘贴或复制兜底" />
    </section>

    <section>
      <h2>多行编辑区</h2>
      <p class="hint">聚焦后执行词条，验证换行和长文本是否稳定保留。</p>
      <textarea id="multi-line" placeholder="等待 PromptPanel 自动粘贴或复制兜底"></textarea>
    </section>

    <section>
      <h2>代码样式编辑区</h2>
      <p class="hint">这是一个 contenteditable 区域，用来模拟常见代码或富文本编辑区的粘贴目标。</p>
      <div id="code-like" class="code-editor" contenteditable="true" spellcheck="false"></div>
    </section>
  </main>

  <script>
    const initialCode = [
      "function verifyPromptPanel() {",
      "  // 聚焦这里后执行词条，检查内容是否能稳定落入编辑区",
      "}"
    ].join("\n");

    function resetFields() {
      document.getElementById("single-line").value = "";
      document.getElementById("multi-line").value = "";
      document.getElementById("code-like").textContent = initialCode;
    }

    resetFields();
  </script>
</body>
</html>
